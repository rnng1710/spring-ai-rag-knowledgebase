# Dedicated Milvus collection for ecom benchmark runs.
# Keeps benchmark traffic isolated from business collections.
spring.ai.vectorstore.milvus.collection-name=ecom_benchmark_vector_me

# Only rebuild when you explicitly need a clean collection.
rag.milvus.force-rebuild=false

# ecom benchmark dataset paths
rag.benchmark.dataset-name=ecom
rag.benchmark.corpus-file=C:/Users/rnng/Desktop/Multi-CPR/data/ecom/corpus.tsv
rag.benchmark.query-file=C:/Users/rnng/Desktop/Multi-CPR/data/ecom/dev.query.txt
rag.benchmark.qrels-file=C:/Users/rnng/Desktop/Multi-CPR/data/ecom/qrels.dev.tsv

# Auto import corpus.tsv into the benchmark collection before retrieval benchmark
rag.benchmark.auto-import-corpus=true
rag.benchmark.force-import=true
rag.benchmark.import-batch-size=1000
rag.benchmark.import-max-rows=-1
rag.benchmark.import-timeout-minutes=30

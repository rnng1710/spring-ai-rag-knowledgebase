spring.application.name=rag

Active Profile

spring.profiles.active=ollama-openai

Spring AI / Ollama

spring.ai.openai.api-key=${AI_API_KEY:ollama}
spring.ai.openai.deepseek.read-timeout-ms=60000

Spring AI / Google Gemini (Google AI Studio - API Key)

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash

Disable Spring AI auto-schema, use MilvusSchemaInitializer instead

spring.ai.vectorstore.milvus.initialize-schema=false

BGE-M3 outputs 1024-dimensional vectors

spring.ai.vectorstore.milvus.embedding-dimension=1024

Force rebuild collection (set to true to rebuild, then back to false)

rag.milvus.force-rebuild=false
spring.ai.ollama.chat.options.num-ctx=16384

Hybrid Search & Rerank Config

rag.retrieval.dense-topk=50
rag.retrieval.max-context-chars=40000
rag.retrieval.hybrid-topk=120
rag.retrieval.rerank-topk=40
rag.retrieval.parent-block-size=1200
rag.retrieval.parent-block-overlap=200
rag.retrieval.child-chunk-size=200
rag.retrieval.child-chunk-overlap=80
rag.retrieval.rrf-k=60

Agent RAG Config

rag.agent.enable=true
rag.agent.max-steps=3
rag.agent.timeout-ms=12000
rag.agent.default-mode=rag

Auto Evaluation Config

rag.evaluation.ragas.url=${RAGAS_EVALUATION_URL:http://192.168.193.128:8101/evaluate}
rag.evaluation.ragas.timeout-ms=300000
rag.evaluation.auto.sample-size=20
rag.evaluation.auto.batch-size=5
rag.evaluation.auto.sample-window-hours=24
rag.evaluation.auto.cron=0 0 4 * * ?
rag.evaluation.auto.run-timeout-minutes=120

Local BGE Reranker (TEI)

[WARN] Use environment variables or local overrides for IPs

rag.rerank.url=${RERANK_URL:http://localhost:8099/rerank}
rag.rerank.timeout-ms=5000

Resilience4j Config (Circuit Breaker + Bulkhead)

spring.aop.proxy-target-class=true
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.bulkhead.configs.default.registerHealthIndicator=true

RerankService Circuit Breaker

resilience4j.circuitbreaker.instances.rerankService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.rerankService.slowCallDurationThreshold=10000ms
resilience4j.circuitbreaker.instances.rerankService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.rerankService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.rerankService.slidingWindowSize=20
resilience4j.circuitbreaker.instances.rerankService.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.rerankService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.rerankService.waitDurationInOpenState=300000ms
resilience4j.circuitbreaker.instances.rerankService.permittedNumberOfCallsInHalfOpenState=3

RerankService Bulkhead (Semaphore Isolation)

resilience4j.bulkhead.instances.rerankService.maxConcurrentCalls=10
resilience4j.bulkhead.instances.rerankService.maxWaitDuration=0

spring.profiles.group.qianfan=single-document-batching

Actuator & Tracing

management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.1}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:3000/api/public/otel/v1/traces}
management.otlp.tracing.headers[Authorization]=${OTEL_EXPORTER_OTLP_AUTHORIZATION:}
management.otlp.tracing.headers[x-langfuse-ingestion-version]=4
management.endpoints.web.exposure.include=prometheus,health
management.health.circuitbreakers.enabled=true
management.health.bulkheads.enabled=true

Upload Limits

rag.upload.max-size-bytes=52428800
rag.upload.allowed-ext=pdf,doc,docx,txt,md
rag.etl.timeout.read-seconds=900
rag.ocr.timeout-ms=840000

MyBatis Plus

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/*.xml

JWT Configuration

[SECURITY] DO NOT COMMIT REAL SECRETS.

security.jwt.secret=${JWT_SECRET:change_me_to_a_secure_random_string_32_bytes+}
security.jwt.expiration=3600000
security.jwt.refresh-expiration=86400000

Local Windows Python BGE-M3 Server

rag.embedding.url=${EMBEDDING_URL:http://localhost:8098}
rag.embedding.timeout-ms=30000
rag.milvus.acl-refresh-query-limit=10000
rag.acl-refresh.retry.fixed-delay-ms=300000
rag.acl-refresh.retry.batch-size=20
rag.acl-refresh.retry.max-retries=5

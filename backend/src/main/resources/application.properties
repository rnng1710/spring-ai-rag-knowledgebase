logging.level.net.topikachu.rag.service.chat.ChatService=DEBUG
spring.application.name=rag
# Active Profile
spring.profiles.active=ollama-openai

# Spring AI / Ollama
spring.ai.openai.api-key=ollama
# Disable Spring AI auto-schema, use MilvusSchemaInitializer instead
spring.ai.vectorstore.milvus.initialize-schema=false
# BGE-M3 outputs 1024-dimensional vectors
spring.ai.vectorstore.milvus.embedding-dimension=1024
# Force rebuild collection (set to true to rebuild, then back to false)
rag.milvus.force-rebuild=false
spring.ai.ollama.chat.options.num-ctx=16384

# Hybrid Search & Rerank Config
rag.retrieval.dense-topk=50
rag.retrieval.max-context-chars=24000
rag.retrieval.hybrid-topk=20
rag.retrieval.rerank-topk=8
rag.retrieval.rrf-k=60

# Local BGE Reranker (TEI)
rag.rerank.url=http://192.168.193.128:8099/rerank
rag.rerank.timeout-ms=500

# Resilience4j Config (Circuit Breaker + Bulkhead)
spring.aop.proxy-target-class=true
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.bulkhead.configs.default.registerHealthIndicator=true

# RerankService Circuit Breaker
resilience4j.circuitbreaker.instances.rerankService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.rerankService.slowCallDurationThreshold=10000ms
resilience4j.circuitbreaker.instances.rerankService.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.rerankService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.rerankService.slidingWindowSize=20
resilience4j.circuitbreaker.instances.rerankService.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.rerankService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.rerankService.waitDurationInOpenState=30000ms
resilience4j.circuitbreaker.instances.rerankService.permittedNumberOfCallsInHalfOpenState=3

# RerankService Bulkhead (Semaphore Isolation)
resilience4j.bulkhead.instances.rerankService.maxConcurrentCalls=10
resilience4j.bulkhead.instances.rerankService.maxWaitDuration=0

spring.profiles.group.qianfan=single-document-batching

# Actuator & Tracing
management.tracing.enabled=false
management.endpoints.web.exposure.include=prometheus,health
management.health.circuitbreakers.enabled=true
management.health.bulkheads.enabled=true

# Upload Limits
rag.upload.max-size-bytes=52428800
rag.upload.allowed-ext=pdf,doc,docx,txt,md

# MyBatis Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.mapper-locations=classpath:mapper/*.xml

# JWT Configuration
# Secret must be at least 32 bytes for HmacSHA256
security.jwt.secret=5f6d7e8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e
security.jwt.expiration=3600000
security.jwt.refresh-expiration=86400000

# Local Windows Python BGE-M3 Server
rag.embedding.url=http://localhost:8098
rag.embedding.timeout-ms=30000

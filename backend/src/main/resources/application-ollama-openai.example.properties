# 1. Ollama (OpenAI-compatible)
spring.ai.openai.base-url=http://localhost:11434
spring.ai.openai.api-key=ollama

spring.ai.openai.chat.options.model=qwen2.5:3b
spring.ai.openai.embedding.options.model=nomic-embed-text
spring.ai.openai.embedding.options.dimensions=768

# 2. Milvus
spring.ai.vectorstore.milvus.client.host=YOUR_MILVUS_HOST
spring.ai.vectorstore.milvus.client.port=19530
spring.ai.vectorstore.milvus.embedding-dimension=768
spring.ai.vectorstore.milvus.collection-name=campus_knowledge_vector

# 3. MySQL
spring.datasource.url=jdbc:mysql://YOUR_MYSQL_HOST:3306/campus_knowledge?useSSL=false&characterEncoding=utf8
spring.datasource.username=YOUR_MYSQL_USER
spring.datasource.password=YOUR_MYSQL_PASSWORD

# 4. Redis
spring.data.redis.host=YOUR_REDIS_HOST
spring.data.redis.port=6379

# 5. RAG input
input.directory=YOUR_INPUT_DIRECTORY

# 6. OpenTelemetry (OTLP)
otel.exporter.otlp.endpoint=http://YOUR_OTEL_HOST:4318

#7. jwt
security.jwt.secret=123456 
